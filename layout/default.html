<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    {% if page.title %}
      {{ page.title }} – {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>
  <link rel="stylesheet" href="{{ site.url }}/assets/css/style.css">
  <link rel="icon" type="image/png" href="https://i.imgur.com/SCmKKJT.jpg" />
  <link rel="apple-touch-icon" href="https://i.imgur.com/SCmKKJT.jpg" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="{{ site.url }}/">
        {{ site.title }}
      </a>
      <nav class="site-nav">
        <a href="{{ site.url }}/">Home</a>
        <a href="{{ site.url }}/about/">About</a>
        <a href="{{ site.url }}/blog/">Blog</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. Built with Jekyll.</p>
      <p>&copy; ©PeterMaZep and Eeeysh 2026</p>
    </div>
  </footer>

</body>
</html>
